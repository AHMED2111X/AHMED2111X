<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FALCON INTEGRITY FIX</title>
    <style>
        /* --- الأساسيات --- */
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            font-family: sans-serif;
            overflow: hidden;
        }

        .layout-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-direction: row-reverse; /* القائمة على اليمين كما في تصميمك */
        }

        .sidebar-container {
            width: 330px;
            background-color: #050505;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 99;
            flex-shrink: 0;
        }

        /* --- الهيدر وتنسيق النصوص --- */
        .header-branding {
            text-align: center;
            margin-bottom: 45px;
            width: 100%;
        }

        .english-name {
            display: block;
            color: #fff;
            font-size: 19px;
            font-weight: bold;
            margin: 0 auto;
            white-space: nowrap;
            /* حركة الذهاب والإياب الكلية بعد التجميع */
            animation: global-sway 5s ease-in-out infinite 3.5s;
        }

        /* --- تأثير تجميع الأحرف --- */
        .english-name span {
            display: inline-block;
            opacity: 0;
            transform: translateY(-20px);
            filter: blur(5px);
            animation: letter-assemble 0.6s forwards;
        }

        /* توقيت الظهور بالترتيب من اليسار لليمين */
        .english-name span:nth-child(1) { animation-delay: 0.1s; }
        .english-name span:nth-child(2) { animation-delay: 0.2s; }
        .english-name span:nth-child(3) { animation-delay: 0.3s; }
        .english-name span:nth-child(4) { animation-delay: 0.4s; }
        .english-name span:nth-child(5) { animation-delay: 0.5s; }
        .english-name span:nth-child(6) { animation-delay: 0.6s; }
        .english-name span:nth-child(n+7) { animation-delay: 0.9s; }

        @keyframes letter-assemble {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
                text-shadow: 0 0 10px rgba(158, 202, 255, 0.5);
            }
        }

        @keyframes global-sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); color: #9ecaff; }
        }

        /* --- اسم المطور --- */
        .dev-tag {
            color: #9ecaff;
            font-size: 12px;
            margin-top: 10px;
            display: block;
            text-align: center;
            opacity: 0.8;
            animation: dev-sway 6s ease-in-out infinite;
        }

        @keyframes dev-sway {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-6px); }
        }

        /* --- الأزرار --- */
        .navigation-menu { display: flex; flex-direction: column; gap: 18px; }

        .action-link {
            text-decoration: none;
            padding: 18px 12px;
            border-radius: 14px;
            text-align: center;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            transition: 0.4s;
        }

        .blue-btn { background: #0088cc; color: #fff; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3); }
        .grey-btn { background: #1e1e1e; color: #fff; border: 1px solid #333; }
        .black-btn { background: #0c0c0c; color: #fff; border: 1px solid #444; }
        
        .top-txt { font-size: 13px; margin-bottom: 4px; }
        .bottom-txt { font-size: 11px; opacity: 0.9; }

        /* --- عارض الصورة --- */
        .image-viewer {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .main-logo {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.9));
        }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <aside class="sidebar-container">
            <div class="header-branding">
                <h1 class="english-name" dir="ltr">
                    <span>F</span><span>A</span><span>L</span><span>C</span><span>O</span><span>N</span><span>&nbsp;</span>
                    <span>I</span><span>N</span><span>T</span><span>E</span><span>G</span><span>R</span><span>I</span><span>T</span><span>Y</span><span>&nbsp;</span>
                    <span>F</span><span>I</span><span>X</span>
                </h1>
                <p class="dev-tag">By ABUFARID</p>
            </div>

            <nav class="navigation-menu">
                <a href="https://t.me/falcon_kernel" class="action-link blue-btn">
                    <span class="top-txt">يوجد لدينا جميع أنواع هاكات ببجي موبايل</span>
                    <span class="bottom-txt">للتواصل اضغط هنا</span>
                </a>

                <a href="https://t.me/falconkernal" class="action-link grey-btn">
                    الانضمام إلى قناة التليجرام
                </a>

                <a href="https://github.com/AHMED2111X/AHMED2111X/releases/latest" class="action-link black-btn">
                    تحميل آخر تحديث من FALCON INTEGRITY FIX
                </a>
            </nav>
        </aside>

        <main class="image-viewer">
            <img src="Falcon.png" alt="Falcon" class="main-logo">
        </main>
    </div>

</body>
</html>
